services:
  postgres:
    image: postgres:16-alpine
    container_name: smartiktg-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartiktg}
      POSTGRES_USER: ${POSTGRES_USER:-smartiktg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartiktg_pass}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartiktg} -d ${POSTGRES_DB:-smartiktg}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: smartiktg-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: smartiktg-backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/media:/app/backend/media
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: smartiktg-bot
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./backend/media:/app/backend/media
    restart: unless-stopped

  admin:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: smartiktg-admin
    ports:
      - "5173:80"
    restart: unless-stopped
