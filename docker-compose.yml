services:
  postgres:
    image: postgres:16-alpine
    container_name: smartiktg-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartiktg}
      POSTGRES_USER: ${POSTGRES_USER:-smartiktg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartiktg_pass}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: smartiktg-backend
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    volumes:
      - ./backend/media:/app/backend/media
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: smartiktg-bot
    env_file:
      - .env
    depends_on:
      - backend
    volumes:
      - ./backend/media:/app/backend/media
    restart: unless-stopped

  admin:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: smartiktg-admin
    ports:
      - "5173:80"
    restart: unless-stopped
